---
# Cover open/close button
# vars:
  # uid:
  # height:
  # text:
  # icon_closed: icon glyph when cover is closed
  # icon_open:   icon glyph when cover is open
  # entity_id:
            height: ${height}
            id: button_${uid}
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: icon_${uid}
                  text: ${icon_closed}
                  styles: button_text_style
              - label:
                  align: bottom_left
                  id: label_${uid}
                  text: ${text}
                  styles: button_text_style
            on_short_click:
                - homeassistant.action:
                    action: cover.toggle
                    data:
                      entity_id: ${entity_id}
